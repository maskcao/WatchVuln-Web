{{template "layout.html" .}}
{{define "content"}}
<h1>系统日志</h1>

<div class="settings-section">
    <div style="margin-bottom:16px;display:flex;gap:8px;align-items:center">
        <button id="refreshBtn" class="btn">刷新日志</button>
        <button id="clearBtn" class="btn" style="background:#666">清空显示</button>
        <span id="logCount" style="margin-left:16px;color:#666;font-size:13px"></span>
    </div>
    <div id="logContainer" style="background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:4px;font-family:monospace;font-size:13px;max-height:600px;overflow-y:auto;">
        <div style="color:#888">正在加载日志...</div>
    </div>
</div>

<script>
(function() {
    var container = document.getElementById('logContainer');
    var countSpan = document.getElementById('logCount');

    function loadLogs() {
        fetch('/api/logs?limit=500', { credentials: 'include' })
            .then(function(r) {
                console.log('Response status:', r.status);
                if (!r.ok) {
                    container.innerHTML = '<div style="color:#f66">加载失败: HTTP ' + r.status + '</div>';
                    return null;
                }
                return r.json();
            })
            .then(function(resp) {
                console.log('Response data:', resp);
                if (resp && resp.success && resp.data) {
                    renderLogs(resp.data);
                } else if (resp) {
                    container.innerHTML = '<div style="color:#f66">加载失败: ' + (resp.error || '未知错误') + '</div>';
                }
            })
            .catch(function(e) {
                console.error('Fetch error:', e);
                container.innerHTML = '<div style="color:#f66">加载失败: ' + e.message + '</div>';
            });
    }

    function renderLogs(logs) {
        if (!logs || logs.length === 0) {
            container.innerHTML = '<div style="color:#888">暂无日志</div>';
            countSpan.textContent = '';
            return;
        }

        var html = '<table style="width:100%;border-collapse:collapse;">';
        html += '<tr style="text-align:left;border-bottom:1px solid #333;">';
        html += '<th style="padding:4px 8px;width:160px">时间</th>';
        html += '<th style="padding:4px 8px;width:60px">级别</th>';
        html += '<th style="padding:4px 8px">消息</th>';
        html += '</tr>';

        for (var i = 0; i < logs.length; i++) {
            var log = logs[i];
            var levelClass = 'info';
            if (log.level === 'error') levelClass = 'error';
            else if (log.level === 'warn') levelClass = 'warn';
            else if (log.level === 'debug') levelClass = 'debug';

            var time = new Date(log.time).toLocaleString('zh-CN', {hour12: false});

            html += '<tr style="border-bottom:1px solid #2a2a2a;">';
            html += '<td style="padding:4px 8px;color:#888">' + time + '</td>';
            html += '<td style="padding:4px 8px;"><span class="log-level-' + levelClass + '">' + log.level + '</span></td>';
            html += '<td style="padding:4px 8px;word-break:break-all">' + escapeHtml(log.message) + '</td>';
            html += '</tr>';
        }
        html += '</table>';
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
        countSpan.textContent = '共 ' + logs.length + ' 条日志';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;');
    }

    document.getElementById('refreshBtn').addEventListener('click', loadLogs);

    document.getElementById('clearBtn').addEventListener('click', function() {
        container.innerHTML = '<div style="color:#888">日志已清空（刷新后会重新加载）</div>';
        countSpan.textContent = '';
    });

    loadLogs();

    // Auto refresh every 10 seconds
    setInterval(loadLogs, 10000);
})();
console.log("logs.html script loaded");
</script>

<style>
.log-level-info { color: #4fc3f7; }
.log-level-warn { color: #ffb74d; }
.log-level-error { color: #ef5350; }
.log-level-debug { color: #9e9e9e; }
</style>
{{end}}
